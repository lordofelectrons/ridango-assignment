name: Build and Test CI - Ridango News App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        # NEWS_API_KEY secret is optional — build and tests pass without it.
        # Only needed if you want the CI-built APK to make real API calls.
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew test
